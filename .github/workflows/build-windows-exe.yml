name: Build Windows EXE

# Lightweight, on-demand Windows-only build. Produces the installer + portable
# .exe as a downloadable artifact. No test gate / macOS / Linux / release steps,
# so it is fast and has few failure points — ideal for grabbing a build quickly.
#
# Run it from the GitHub UI: Actions tab -> "Build Windows EXE" -> Run workflow.

on:
  workflow_dispatch:

jobs:
  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Bundle qpdf (offline PDF deep-clean)
        shell: bash
        run: perl ./update_qpdf.pl

      - name: Build Windows artifacts
        run: yarn packwin --publish never

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ExifCleaner-windows-exe
          path: dist/*.exe
          retention-days: 30
